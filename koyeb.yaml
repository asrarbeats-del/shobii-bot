version: v1
services:
  - name: shobii-bot
    type: worker
    docker:
      dockerfile: Dockerfile
    env:
      - key: SESSION_ID
        value: ""
      - key: BOT_NAME
        value: "SHOBII-BOT"
      - key: OWNER_NUMBER
        value: "923270321760"
      - key: PREFIX
        value: "."
      - key: MODE
        value: "public"
      - key: ANTI_LINK
        value: "true"
      - key: antidelete
        value: "all"
      - key: AutoReaction
        value: "true"
      - key: STATUSVIEW
        value: "true"
      - key: StatusLikes
        value: "true"
      - key: ANTISPAM
        value: "true"
      - key: PORT
        value: "3000"
    ports:
      - port: 3000
        protocol: http
